services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      CALLBACK_ADDR: ":8080"
    expose:
      - "8080"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - caddy_net

  mongo:
    image: mongo:7
    restart: unless-stopped
    # No ports exposed — only accessible from internal network
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - caddy_net

volumes:
  mongo_data:

networks:
  caddy_net:
    external: true

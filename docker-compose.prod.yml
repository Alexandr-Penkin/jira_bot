services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      CALLBACK_ADDR: ":8080"
    expose:
      - "8080"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    container_name: bot
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - internal
      - caddy_net

volumes:
  mongo_data:

networks:
  internal:
    enable_ipv6: false
  caddy_net:
    external: true
